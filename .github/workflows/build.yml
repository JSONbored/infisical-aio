name: CI / Infisical AIO

on:
  push:
    branches: [main]
    paths:
      - "*.xml"
      - ".github/workflows/**"
      - ".trunk/**"
      - "CHANGELOG.md"
      - "Dockerfile"
      - "assets/**"
      - "cliff.toml"
      - "components.toml"
      - "components/**"
      - "docs/upstream/**"
      - "pyproject.toml"
      - "renovate.json"
      - "requirements-dev.txt"
      - "rootfs/**"
      - "scripts/**"
      - "tests/**"
      - "upstream.toml"
  pull_request:
    branches: [main]
    paths:
      - "*.xml"
      - ".github/workflows/**"
      - ".trunk/**"
      - "CHANGELOG.md"
      - "Dockerfile"
      - "assets/**"
      - "cliff.toml"
      - "components.toml"
      - "components/**"
      - "docs/upstream/**"
      - "pyproject.toml"
      - "renovate.json"
      - "requirements-dev.txt"
      - "rootfs/**"
      - "scripts/**"
      - "tests/**"
      - "upstream.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aio-build:
    uses: JSONbored/aio-fleet/.github/workflows/aio-build.yml@7bfda522056a626fe401b734fbdd97239c0955b2
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      app_slug: infisical-aio
      image_name: jsonbored/infisical-aio
      workflow_title: CI / Infisical AIO
      docker_cache_scope: infisical-aio-image
      pytest_image_tag: infisical-aio:pytest
      publish_profile: changelog-version
      upstream_name: Infisical
      image_description: Unraid-first AIO wrapper image for Infisical
      python_version: "3.13"
      trunk_org_slug: aethereal
      publish_platforms: linux/amd64,linux/arm64
      checkout_submodules: false
      integration_pytest_args: tests/integration -m integration
      run_extended_integration: false
      extended_integration_pytest_args: ""
      generator_check_command: python3 scripts/generate_infisical_template.py --check
      upstream_digest_arg: UPSTREAM_IMAGE_DIGEST
      xml_paths: |
        *.xml
        assets/**
      extra_publish_paths: |

      catalog_assets: |
        infisical-aio.xml|infisical-aio.xml
        assets/app-icon.png|icons/infisical.png
    secrets: inherit
