schema_version: 1
repo: infisical-aio
github_repo: JSONbored/infisical-aio
app_slug: infisical-aio
image:
  name: jsonbored/infisical-aio
  cache_scope: infisical-aio-image
  pytest_tag: infisical-aio:pytest
  publish_platforms: linux/amd64,linux/arm64
release:
  name: Infisical-AIO
  profile: changelog-version
  previous_tag_command: latest-aio-tag
upstream:
  name: Infisical
  version_key: UPSTREAM_VERSION
  digest_arg: UPSTREAM_IMAGE_DIGEST
  commit_paths:
    - Dockerfile
    - infisical-aio.xml
  monitor:
    - component: aio
      name: Infisical
      source: github-releases
      repo: Infisical/infisical
      image: infisical/infisical
      digest_source: dockerhub
      dockerfile: Dockerfile
      version_key: UPSTREAM_VERSION
      digest_key: UPSTREAM_IMAGE_DIGEST
      stable_only: true
      strategy: pr
      release_notes_url: https://github.com/Infisical/infisical/releases
    - component: mailpit
      name: Mailpit
      source: github-releases
      repo: axllent/mailpit
      image: axllent/mailpit
      digest_source: dockerhub
      dockerfile: Dockerfile
      version_key: MAILPIT_VERSION
      digest_key: MAILPIT_IMAGE_DIGEST
      stable_only: true
      strategy: pr
      release_notes_url: https://github.com/axllent/mailpit/releases
template:
  xml_paths:
    - "*.xml"
    - assets/**
  generated: true
  generator_check_command: python3 scripts/generate_infisical_template.py --check
catalog:
  published: true
  assets:
    - source: infisical-aio.xml
      target: infisical-aio.xml
    - source: assets/app-icon.png
      target: icons/infisical.png
tests:
  unit: tests/template
  integration: tests/integration -m integration
  checkout_submodules: false
